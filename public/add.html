<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
    <link rel="stylesheet" href="styles/add.css">
    <script src="scripts/add.js" defer></script>
</head>

<body>

    <header>
        <div class="logo" onclick="goHome()" style="cursor:pointer;">BookShare</div>
        <button onclick="goBack()">← Back</button>
    </header>

    <div class="container">

        <h2>Add a New Book</h2>

        <form id="addBookForm" class="form-container">
            <input type="text" id="title" placeholder="Title" required>

            <textarea id="description" placeholder="Description"></textarea>

            <input type="text" id="author_name" placeholder="Author Name">

            <button type="submit">Add Book</button>
        </form>

        <div class="form-container">
            <h3>Search Google Books</h3>

            <input type="text" id="googleSearch" placeholder="Search Google Books...">
            <button type="button" onclick="searchGoogleBooks()">Search</button>

            <div id="results"></div>
        </div>

    </div>

</body>

</html>
