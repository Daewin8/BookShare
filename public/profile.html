<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - BookShare</title>
    <link rel="stylesheet" href="styles/profile.css">
    <script src="scripts/profile.js" defer></script>
</head>

<body>

    <header>
        <div class="logo" onclick="goHome()" style="cursor:pointer;">BookShare</div>

        <div class="nav-links">
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="container">

        <div class="profile-header">
            <h2 id="username">User</h2>
            <p>Books Read: <span id="booksReadCount">0</span></p>
            <p>Currently Reading: <span id="booksReadingCount">0</span></p>
            <p>Want to Read: <span id="booksWantCount">0</span></p>
        </div>

        <div class="tabs">
            <button class="active" onclick="showTab('readingTab', this)">Reading</button>
            <button onclick="showTab('readTab', this)">Read</button>
            <button onclick="showTab('wantTab', this)">Want to Read</button>
        </div>

        <div id="readingTab">
            <h3>Currently Reading</h3>
            <div class="grid" id="readingGrid"></div>
        </div>

        <div id="readTab" class="hidden">
            <h3>Read Books</h3>
            <div class="grid" id="readGrid"></div>
        </div>

        <div id="wantTab" class="hidden">
            <h3>Want to Read</h3>
            <div class="grid" id="wantGrid"></div>
        </div>

    </div>

</body>

</html>
