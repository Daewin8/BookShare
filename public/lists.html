<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookShare MVP</title>
    <link rel="stylesheet" href="styles/lists.css">
    <script src="scripts/lists.js" defer></script>
</head>

<body>

    <header>
        <div class="logo">BookShare</div>
        <div class="nav-links">
            <input type="text" placeholder="Search...">
            <button onclick="showPage('booksPage')">All Books</button>
            <button onclick="showPage('listsPage')">Lists</button>
            <button>Profile</button>
            <button>Login</button>
        </div>
    </header>

    <div class="container">

        <div id="booksPage">
            <div class="form-container">
                <form id="bookForm">
                    <input type="text" id="title" placeholder="Title" required>
                    <input type="text" id="author" placeholder="Author" required>
                    <select id="status">
                        <option value="Reading">Reading</option>
                        <option value="Completed">Completed</option>
                        <option value="Want to Read">Want to Read</option>
                    </select>
                    <select id="rating">
                        <option value="">Rating</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                    <button type="submit">Add</button>
                </form>
            </div>

            <div class="grid" id="bookGrid"></div>
        </div>

        <div id="listsPage" class="hidden">
            <h2>Lists</h2>
            <div class="grid" id="listsGrid"></div>
        </div>

        <div id="singleListPage" class="hidden">
            <button onclick="showPage('listsPage')">← Back to Lists</button>
            <h2 id="listTitle"></h2>
            <div class="grid" id="singleListGrid"></div>
        </div>

    </div>

</body>

</html>
