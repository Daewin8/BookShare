<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookShare MVP</title>
    <link rel="stylesheet" href="styles/index.css">
    <script src="scripts/index.js" defer></script>
</head>

<body>

    <header>
        <div class="logo" onclick="goToHome()" style="cursor:pointer;">BookShare</div>

        <div class="nav-links">
            <input type="text" id="globalSearch" placeholder="Search books...">
            <button onclick="goToAddPage()">Add Book</button>

            <button id="loginBtn" onclick="goToLogin()">Login</button>
            <button id="profileBtn" onclick="goToProfile()" style="display:none;">Profile</button>

            <!-- NEW -->
            <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="book-grid" id="bookGrid"></div>
    </div>

</body>

</html>
